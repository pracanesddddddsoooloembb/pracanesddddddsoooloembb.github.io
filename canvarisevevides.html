      function tryForceHighest(reason) {
        const now = Date.now();
        if (highestIndex === null) return;
        if (now - lastForcedAt < currentBackoff) return;
        try {
          player.setCurrentQuality(highestIndex);
          lastForcedAt = now;

          let bestIdx = 0;

          levels.forEach((lvl, i) => {

    <script>
        (function() {
            // Detección robusta exclusivamente de celulares y tablets (Android, iOS viejos/nuevos, iPadOS, Redmi, etc.)
            const isMobileOrTablet = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                                     (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); // Detecta iPads modernos

            if (!isMobileOrTablet) return; // Se aborta si es PC de escritorio o SmartTV

            function lockLandscape() {
                try {
                    // API moderna (Android y navegadores recientes)
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(e => console.warn("Orientation API error:", e));
                    } 
                    // APIs antiguas (Navegadores viejos)
                    else if (screen.lockOrientation) {
                        screen.lockOrientation('landscape');
                    } else if (screen.mozLockOrientation) {
                        screen.mozLockOrientation('landscape');
                    } else if (screen.msLockOrientation) {
                        screen.msLockOrientation('landscape');
                    }
                } catch (err) {
                    console.log("No se pudo forzar landscape de forma nativa.", err);
                }
            }

            function unlockLandscape() {
                try {
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock();
                    } else if (screen.unlockOrientation) {
                        screen.unlockOrientation();
                    } else if (screen.mozUnlockOrientation) {
                        screen.mozUnlockOrientation();
                    } else if (screen.msUnlockOrientation) {
                        screen.msUnlockOrientation();
                    }
                } catch (err) {}
            }

            // Esperar a que el reproductor JWPlayer esté inicializado (sin interferir con el original)
            const checkPlayerInterval = setInterval(() => {
                if (typeof jwplayer === 'function') {
                    const player = jwplayer("player");
                    if (player && player.getState() !== null) {
                        clearInterval(checkPlayerInterval);
                        
                        // Capturar el evento de pantalla completa de forma independiente
                        player.on('fullscreen', function(e) {
                            const playerElement = document.getElementById('player');
                            if (e.fullscreen) {
                                lockLandscape();
                                // Fallback extremo CSS para iOS e iPads que ignoran las APIs de orientación
                                setTimeout(() => {
                                    if (window.innerHeight > window.innerWidth) { // Si la pantalla sigue estando en vertical
                                        playerElement.style.setProperty('transform', 'rotate(90deg)', 'important');
                                        playerElement.style.setProperty('transform-origin', 'center center', 'important');
                                        playerElement.style.setProperty('width', '100vh', 'important');
                                        playerElement.style.setProperty('height', '100vw', 'important');
                                        playerElement.style.setProperty('position', 'fixed', 'important');
                                        playerElement.style.setProperty('top', '0', 'important');
                                        playerElement.style.setProperty('left', '0', 'important');
                                        playerElement.style.setProperty('z-index', '999999', 'important');
                                    }
                                }, 300);
                            } else {
                                unlockLandscape();
                                // Limpiar todos los estilos forzados al salir
                                playerElement.style.transform = '';
                                playerElement.style.width = '';
                                playerElement.style.height = '';
                                playerElement.style.position = '';
                                playerElement.style.top = '';
                                playerElement.style.left = '';
                                playerElement.style.zIndex = '';
                            }
                        });
                    }
                }
            }, 500);

            // Vigilar los giros de pantalla del usuario para re-aplicar si es necesario
            window.addEventListener("orientationchange", function() {
                const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
                if (isFullscreen) lockLandscape();
            });
        })();
    </script>
