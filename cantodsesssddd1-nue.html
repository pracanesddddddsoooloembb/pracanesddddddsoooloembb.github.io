<!-- CONFIGURACIÓN AVANZADA PARA MÓVILES Y TABLETS (Forzar Horizontal) -->
<script type="text/javascript">
    function manageOrientation() {
        // Detecta si se entró en modo pantalla completa
        var isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
        
        // Verifica si el usuario está en un dispositivo móvil o tablet (Android, iOS, iPadOS, etc.)
        var isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || (navigator.maxTouchPoints && navigator.maxTouchPoints > 2);

        if (isFullscreen && isMobileDevice) {
            // Entró a pantalla completa en móvil: Forzar Horizontal (Landscape)
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(function(error) { 
                    console.log('Bloqueo de rotación no soportado nativamente o requiere interacción: ', error); 
                });
            } else if (screen.lockOrientation) {
                screen.lockOrientation('landscape');
            } else if (screen.mozLockOrientation) {
                screen.mozLockOrientation('landscape');
            } else if (screen.msLockOrientation) {
                screen.msLockOrientation('landscape');
            }
        } else if (!isFullscreen && isMobileDevice) {
            // Salió de pantalla completa en móvil: Desbloquear orientación para que gire libremente
            if (screen.orientation && screen.orientation.unlock) {
                screen.orientation.unlock();
            } else if (screen.unlockOrientation) {
                screen.unlockOrientation();
            } else if (screen.mozUnlockOrientation) {
                screen.mozUnlockOrientation();
            } else if (screen.msUnlockOrientation) {
                screen.msUnlockOrientation();
            }
        }
    }

    // Escuchar el evento de pantalla completa en todos los navegadores posibles (Nuevos y Viejos)
    document.addEventListener("fullscreenchange", manageOrientation);
    document.addEventListener("webkitfullscreenchange", manageOrientation); // Para Safari / iOS viejos
    document.addEventListener("mozfullscreenchange", manageOrientation); // Para Firefox viejos
    document.addEventListener("MSFullscreenChange", manageOrientation); // Para IE/Edge viejos
</script>
